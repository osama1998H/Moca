version: 2

builds:
  - id: moca
    main: ./cmd/moca
    binary: moca
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: moca-server
    main: ./cmd/moca-server
    binary: moca-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: moca-worker
    main: ./cmd/moca-worker
    binary: moca-worker
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: moca-scheduler
    main: ./cmd/moca-scheduler
    binary: moca-scheduler
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: moca-outbox
    main: ./cmd/moca-outbox
    binary: moca-outbox
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "moca_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  disable: true
