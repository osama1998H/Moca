name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC daily
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  check:
    name: Check for new commits
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare HEAD with nightly tag
        id: check
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          NIGHTLY_SHA=$(git rev-parse nightly 2>/dev/null || echo "none")
          if [ "$MAIN_SHA" = "$NIGHTLY_SHA" ]; then
            echo "No new commits since last nightly build — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits detected — proceeding with nightly build."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test & Lint
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set build variables
        id: vars
        run: |
          VERSION="nightly-$(date -u +'%Y%m%d')"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          COMMIT="${{ steps.vars.outputs.commit }}"
          BUILD_DATE="${{ steps.vars.outputs.build_date }}"
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          BINARIES="moca moca-server moca-worker moca-scheduler moca-outbox"
          for bin in ${BINARIES}; do
            go build -ldflags "${LDFLAGS}" -o "dist/${bin}${EXT}" "./cmd/${bin}"
          done

      - name: Package archive
        id: package
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"

          if [ "${GOOS}" = "windows" ]; then
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.zip"
            cd dist && zip "../${ARCHIVE}" * && cd ..
          else
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -czf "${ARCHIVE}" -C dist .
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  publish:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum moca_* > checksums.txt
          cat checksums.txt

      - name: Delete existing nightly release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE="$(date -u +'%Y-%m-%d')"
          gh release create nightly \
            --title "Nightly Build (${BUILD_DATE})" \
            --notes "$(cat <<EOF
          **Automated nightly build from \`main\` branch.**

          - Date: ${BUILD_DATE}
          - Commit: ${GITHUB_SHA::8}

          > **Warning:** Nightly builds are built from the latest \`main\` and may be unstable.
          > For production use, install a [stable release](https://github.com/${{ github.repository }}/releases/latest) instead.

          ### Install

          \`\`\`bash
          MOCA_VERSION=nightly curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
          \`\`\`
          EOF
          )" \
            --prerelease \
            --target "${{ github.sha }}" \
            artifacts/moca_*.tar.gz \
            artifacts/moca_*.zip \
            artifacts/checksums.txt \
            install.sh
