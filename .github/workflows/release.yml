name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  desk-validate:
    name: Desk Validate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'desk/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci
        working-directory: desk

      - name: Typecheck
        run: npm run typecheck
        working-directory: desk

      - name: Build
        run: npm run build
        working-directory: desk

      - name: Verify build output
        run: test -f desk/dist/index.html

  desk-publish:
    name: Publish @moca/desk
    needs: desk-validate
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'desk/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci
        working-directory: desk

      - name: Sync version from Git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: desk

      - name: Publish to GitHub Packages
        run: npm publish
        working-directory: desk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set build variables
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          COMMIT="${{ steps.vars.outputs.commit }}"
          BUILD_DATE="${{ steps.vars.outputs.build_date }}"
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          BINARIES="moca moca-server moca-worker moca-scheduler moca-outbox"
          for bin in ${BINARIES}; do
            go build -ldflags "${LDFLAGS}" -o "dist/${bin}${EXT}" "./cmd/${bin}"
          done

      - name: Package archive
        id: package
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"

          if [ "${GOOS}" = "windows" ]; then
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.zip"
            cd dist && zip "../${ARCHIVE}" * && cd ..
          else
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -czf "${ARCHIVE}" -C dist .
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum moca_* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/moca_*.tar.gz
            artifacts/moca_*.zip
            artifacts/checksums.txt
            install.sh
