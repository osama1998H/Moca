name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Verify single-module builtin core layout
        run: go run ./internal/releaseverify

      - name: External consumer go mod tidy smoke test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

          cd "${TMPDIR}"
          go mod init example.com/moca-release-smoke
          cat > main.go <<'EOF'
          package main

          import (
          	_ "github.com/osama1998H/moca/pkg/builtin/core"
          	_ "github.com/osama1998H/moca/pkg/document"
          	_ "github.com/osama1998H/moca/pkg/hooks"
          )

          func main() {}
          EOF

          export GOPROXY=direct
          export GOSUMDB=off
          export GOPRIVATE=github.com/osama1998H/moca
          export GONOSUMDB="${GOPRIVATE}"

          go get "github.com/osama1998H/moca@${VERSION}"
          go mod tidy
          go build ./...

  test:
    name: Test & Lint
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  desk-validate:
    name: Desk Validate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: desk

      - name: Typecheck
        run: npm run typecheck
        working-directory: desk

      - name: Build
        run: npm run build
        working-directory: desk

      - name: Verify build output
        run: test -f desk/dist/index.html

  desk-publish:
    name: Publish @osama1998h/desk
    needs: [desk-validate, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: desk

      - name: Build library
        run: npm run build:lib
        working-directory: desk

      - name: Sync version from Git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: desk

      - name: Publish to GitHub Packages
        run: npm publish
        working-directory: desk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set build variables
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          COMMIT="${{ steps.vars.outputs.commit }}"
          BUILD_DATE="${{ steps.vars.outputs.build_date }}"
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          BINARIES="moca moca-server moca-worker moca-scheduler moca-outbox"
          for bin in ${BINARIES}; do
            go build -ldflags "${LDFLAGS}" -o "dist/${bin}${EXT}" "./cmd/${bin}"
          done

      - name: Package archive
        id: package
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"

          if [ "${GOOS}" = "windows" ]; then
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.zip"
            cd dist && zip "../${ARCHIVE}" * && cd ..
          else
            ARCHIVE="moca_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -czf "${ARCHIVE}" -C dist .
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum moca_* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/moca_*.tar.gz
            artifacts/moca_*.zip
            artifacts/checksums.txt
            install.sh

  docker-publish:
    name: Publish Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        target:
          - moca
          - moca-server
          - moca-worker
          - moca-scheduler
          - moca-outbox
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/osama1998h/${{ matrix.target }}:${{ steps.version.outputs.version }}
            ghcr.io/osama1998h/${{ matrix.target }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
