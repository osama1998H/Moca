name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all packages
        run: go build ./...

      - name: Build all binaries
        run: make build

      - name: Verify binaries run
        run: |
          ./bin/moca-server
          ./bin/moca-worker
          ./bin/moca-scheduler
          ./bin/moca
          ./bin/moca-outbox

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moca_test
          POSTGRES_USER: moca
          POSTGRES_PASSWORD: moca_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U moca -d moca_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_ENV: development
          MEILI_MASTER_KEY: moca_test
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd "wget --no-verbose --spider http://127.0.0.1:7700/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -race -count=1 -tags=integration -timeout=10m ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  desk:
    name: Desk Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: desk

      - name: Typecheck
        run: npm run typecheck
        working-directory: desk

      - name: Build
        run: npm run build
        working-directory: desk

      - name: Verify build output
        run: test -f desk/dist/index.html

  skylos:
    # Phase 2 of the Skylos rollout: advisory-only while the baseline and
    # false-positive rate stabilise. Promote to a required check (remove
    # `continue-on-error`) after one clean CI week on main. See
    # wiki/Contributing-Skylos-Audit.md for the gate policy.
    name: Skylos Audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Skylos
        run: pip install 'skylos==4.3.2'

      - name: Audit Go backend
        run: make audit-go

      - name: Audit desk/ frontend
        run: make audit-desk
