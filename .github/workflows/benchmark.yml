name: Benchmark Regression Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'pkg/**'
      - 'internal/**'
      - 'cmd/**'
      - 'Makefile'
      - '.github/workflows/benchmark.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moca_test
          POSTGRES_USER: moca
          POSTGRES_PASSWORD: moca_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U moca -d moca_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_ENV: development
          MEILI_MASTER_KEY: moca_test
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd "wget --no-verbose --spider http://127.0.0.1:7700/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      BENCH_PKGS: ./pkg/meta ./pkg/document ./pkg/orm ./pkg/api ./pkg/hooks ./internal/drivers
      PG_HOST: localhost
      REDIS_ADDR: localhost:6380

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Install benchstat
        run: GOWORK=off go install golang.org/x/perf/cmd/benchstat@latest

      - name: Benchmark base branch
        run: |
          set -eo pipefail
          git worktree add /tmp/bench-base ${{ github.event.pull_request.base.sha }}
          cd /tmp/bench-base
          go mod download
          go test -run=^$ -tags=integration -bench=. -benchmem -count=10 -timeout=20m \
            ${BENCH_PKGS} | tee /tmp/bench-base.txt

      - name: Benchmark PR branch
        run: |
          set -eo pipefail
          git worktree add /tmp/bench-pr ${{ github.event.pull_request.head.sha }}
          cd /tmp/bench-pr
          go mod download
          go test -run=^$ -tags=integration -bench=. -benchmem -count=10 -timeout=20m \
            ${BENCH_PKGS} | tee /tmp/bench-pr.txt

      - name: Compare benchmarks
        id: compare
        run: |
          if ! grep -q '^Benchmark' /tmp/bench-pr.txt; then
            echo "status=missing-pr-data" >> "$GITHUB_OUTPUT"
            echo "regression=false" >> "$GITHUB_OUTPUT"
            {
              echo "comment<<EOF"
              echo "## Benchmark Results"
              echo ""
              echo "> No benchmark output was produced on the PR branch."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif ! grep -q '^Benchmark' /tmp/bench-base.txt; then
            echo "status=missing-base-data" >> "$GITHUB_OUTPUT"
            echo "regression=false" >> "$GITHUB_OUTPUT"
            {
              echo "comment<<EOF"
              echo "## Benchmark Results"
              echo ""
              echo "> Baseline unavailable on the base branch, so regression gating was skipped for this PR."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            benchstat /tmp/bench-base.txt /tmp/bench-pr.txt > /tmp/benchstat-output.txt
            cat /tmp/benchstat-output.txt

            FORMATTED=$(bash .github/scripts/format-bench-comment.sh /tmp/benchstat-output.txt /tmp/bench-pr.txt)
            {
              echo "comment<<EOF"
              echo "$FORMATTED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            echo "status=compared" >> "$GITHUB_OUTPUT"

            if printf '%s\n' "$(cat /tmp/benchstat-output.txt)" | awk '
              /^name[[:space:]]/ { next }
              /^[[:space:]]*$/ { next }
              /p=/ {
                if ($0 ~ /~/) {
                  next
                }
                if (match($0, /\+[0-9]+(\.[0-9]+)?%/)) {
                  delta = substr($0, RSTART + 1, RLENGTH - 2) + 0
                  if (delta >= 10) {
                    found = 1
                  }
                }
              }
              END { exit(found ? 0 : 1) }
            '; then
              echo "regression=true" >> "$GITHUB_OUTPUT"
            else
              echo "regression=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Comment on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmark
          message: |
            ${{ steps.compare.outputs.comment }}

      - name: Fail on regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          echo "::error::Benchmark regression detected. See the benchmark PR comment for details."
          exit 1
