<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Moca GraphQL Playground</title>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@3.0.9/graphiql.min.css" />
  <style>
    body { height: 100vh; margin: 0; overflow: hidden; }
    #graphiql { height: 100vh; }
  </style>
</head>
<body>
  <div id="graphiql">Loading...</div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/graphiql@3.0.9/graphiql.min.js"></script>
  <script>
    const siteHeader = document.querySelector('meta[name="x-moca-site"]');
    const siteName = siteHeader ? siteHeader.content : '';

    const fetcher = GraphiQL.createFetcher({
      url: '/api/graphql',
      headers: siteName ? { 'X-Moca-Site': siteName } : {},
    });

    ReactDOM.createRoot(document.getElementById('graphiql')).render(
      React.createElement(GraphiQL, { fetcher: fetcher })
    );
  </script>
</body>
</html>
