<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="border-bottom: 2px solid #4A90D9; padding-bottom: 10px; margin-bottom: 20px;">
    <strong style="font-size: 18px;">Password Reset</strong>
  </div>
  <p>Hello {{.FullName}},</p>
  <p>We received a request to reset your password. Click the link below to set a new password:</p>
  <p style="margin: 20px 0;">
    <a href="{{.ResetLink}}" style="display: inline-block; padding: 10px 20px; background: #4A90D9; color: #fff; text-decoration: none; border-radius: 4px;">Reset Password</a>
  </p>
  <p>If you did not request this, you can safely ignore this email.</p>
  <p style="font-size: 12px; color: #888;">This link expires in {{.ExpiresIn}}.</p>
  <div style="margin-top: 30px; padding-top: 10px; border-top: 1px solid #eee; font-size: 12px; color: #888;">
    This is an automated notification from Moca.
  </div>
</body>
</html>
