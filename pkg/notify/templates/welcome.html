<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="border-bottom: 2px solid #4A90D9; padding-bottom: 10px; margin-bottom: 20px;">
    <strong style="font-size: 18px;">Welcome to Moca</strong>
  </div>
  <p>Hello {{.FullName}},</p>
  <p>Your account has been created. You can log in using the following credentials:</p>
  <div style="margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 4px;">
    <p style="margin: 5px 0;"><strong>Email:</strong> {{.Email}}</p>
    <p style="margin: 5px 0;"><strong>Login URL:</strong> <a href="{{.LoginURL}}">{{.LoginURL}}</a></p>
  </div>
  <p>Please change your password after your first login.</p>
  <div style="margin-top: 30px; padding-top: 10px; border-top: 1px solid #eee; font-size: 12px; color: #888;">
    This is an automated notification from Moca.
  </div>
</body>
</html>
