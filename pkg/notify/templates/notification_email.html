<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="border-bottom: 2px solid #4A90D9; padding-bottom: 10px; margin-bottom: 20px;">
    <strong style="font-size: 18px;">{{.Subject}}</strong>
  </div>
  <div style="line-height: 1.6;">
    {{.Message}}
  </div>
  {{if and .DocumentType .DocumentName}}
  <div style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px;">
    <strong>{{.DocumentType}}</strong>: {{.DocumentName}}
  </div>
  {{end}}
  <div style="margin-top: 30px; padding-top: 10px; border-top: 1px solid #eee; font-size: 12px; color: #888;">
    This is an automated notification from Moca.
  </div>
</body>
</html>
