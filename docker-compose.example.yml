# Moca Production Docker Compose Example
#
# Usage:
#   cp .env.example .env      # copy and edit .env with real secrets
#   docker compose -f docker-compose.example.yml up -d
#
# Each Moca service can either be built from source (default, using the
# local Dockerfile) or pulled from the GitHub Container Registry.
# To use prebuilt images, uncomment the `image:` line and remove `build:`.

networks:
  moca:
    name: moca

volumes:
  postgres_data:
  redis_data:
  meili_data:

services:

  # ---------------------------------------------------------------------------
  # Moca HTTP + WebSocket server
  # ---------------------------------------------------------------------------
  moca-server:
    build:
      context: .
      target: moca-server
    # image: ghcr.io/osama1998h/moca-server:latest
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moca
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M

  # ---------------------------------------------------------------------------
  # Moca background job consumer (Redis Streams)
  # Scale with: docker compose -f docker-compose.example.yml up -d --scale moca-worker=3
  # ---------------------------------------------------------------------------
  moca-worker:
    build:
      context: .
      target: moca-worker
    # image: ghcr.io/osama1998h/moca-worker:latest
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moca
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M

  # ---------------------------------------------------------------------------
  # Moca cron scheduler
  # ---------------------------------------------------------------------------
  moca-scheduler:
    build:
      context: .
      target: moca-scheduler
    # image: ghcr.io/osama1998h/moca-scheduler:latest
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moca
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.25'
    #       memory: 128M

  # ---------------------------------------------------------------------------
  # Moca transactional outbox poller (DB -> Kafka)
  # ---------------------------------------------------------------------------
  moca-outbox:
    build:
      context: .
      target: moca-outbox
    # image: ghcr.io/osama1998h/moca-outbox:latest
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moca
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.25'
    #       memory: 128M

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-moca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moca} -d ${POSTGRES_DB:-moca}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moca

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moca

  # ---------------------------------------------------------------------------
  # Meilisearch v1.12
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moca
