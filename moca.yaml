# Moca Framework Configuration
# Generated by 'moca init'

apps:
    core:
        source: builtin
        version: '*'
staging: {}
project:
    name: Moca
    version: 0.1.0
moca: nightly-20260402
production:
    tls: {}
    proxy: {}
scheduler:
    tick_interval: 60s
    enabled: true
backup:
    destination: {}
    retention: {}
infrastructure:
    storage:
        driver: local
    search:
        engine: meilisearch
        host: localhost
        port: 7700
    database:
        driver: postgres
        host: localhost
        system_db: postgres
        user: postgres
        port: 5432
        pool_size: 10
    kafka:
        enabled: true
        brokers:
            - localhost:9092
    redis:
        host: localhost
        port: 6379
        db_cache: 0
        db_queue: 1
        db_session: 2
        db_pubsub: 3
development:
    port: 8000
    workers: 1
    auto_reload: true
