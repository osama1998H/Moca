# golangci-lint v2 configuration for MOCA framework
# Baseline linter set — expanded as the codebase grows.
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: true
    errcheck:
      check-type-assertions: true
      check-blank: false
  exclusions:
    paths:
      - spikes/

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
