# golangci-lint configuration for MOCA framework
# Baseline linter set — expanded as the codebase grows.

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple

linters-settings:
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
    check-blank: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - spikes
