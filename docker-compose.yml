services:
  postgres:
    image: postgres:16-alpine
    container_name: moca-test-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: moca_test
      POSTGRES_USER: moca
      POSTGRES_PASSWORD: moca_test
    command: ["postgres", "-c", "max_connections=200"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moca -d moca_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: moca-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

  minio:
    image: minio/minio:latest
    container_name: moca-test-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: moca-test-meili
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: moca_test
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 2s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: moca-test-jaeger
    ports:
      - "4317:4317"
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:16686/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /tmp
