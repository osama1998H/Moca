services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: moca-spike-meili
    ports:
      - "7701:7700"
    environment:
      MEILI_MASTER_KEY: moca_test_master_key
      MEILI_ENV: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /meili_data
