services:
  postgres:
    image: postgres:16-alpine
    container_name: moca-spike-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: moca_test
      POSTGRES_USER: moca
      POSTGRES_PASSWORD: moca_test
    command: ["postgres", "-c", "max_connections=200"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moca -d moca_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
